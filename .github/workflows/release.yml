name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app
          ./build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NotEnoughResins
          path: build/NotEnoughResins.app

      - run: zip -r NotEnoughResins.zip build/NotEnoughResins.app

      - uses: softprops/action-gh-release@v2
        with:
          files: NotEnoughResins.zip
